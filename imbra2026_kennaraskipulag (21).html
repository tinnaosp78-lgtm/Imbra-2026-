<html lang="is">
<head>

<title>IMBRA 2026 – Kennaraskipulag</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:        #0033A0;
    --blue-dark:   #00247A;
    --blue-pale:   #E6ECF8;
    --orange:      #FF6B00;
    --orange-dark: #D45700;
    --orange-pale: #FFF0E6;
    --yellow:      #F5C400;
    --yellow-dark: #C9A000;
    --yellow-pale: #FFFAE0;
    --white:       #FFFFFF;
    --off:         #F4F6FB;
    --border:      #DDE3F0;
    --text:        #0A1A3A;
    --muted:       #6B7A99;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--off);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--blue);
    padding: 32px 48px 0;
    border-bottom: 5px solid var(--orange);
  }
  .header-top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    padding-bottom: 24px;
  }
  .header-label {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 6px;
  }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.4rem;
    color: var(--white);
    letter-spacing: 3px;
    line-height: 1;
  }
  header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    color: var(--yellow);
    letter-spacing: 3px;
    margin-top: 3px;
  }

  .btn-print {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 9px 20px;
    border-radius: 3px;
    border: none;
    cursor: pointer;
    background: var(--orange);
    color: var(--white);
    transition: background 0.15s;
    align-self: center;
    margin-bottom: 4px;
  }
  .btn-print:hover { background: var(--orange-dark); }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 4px;
    padding-top: 8px;
  }
  .tab {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 10px 24px;
    border-radius: 5px 5px 0 0;
    border: none;
    cursor: pointer;
    background: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.65);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tab:hover {
    background: rgba(255,255,255,0.2);
    color: var(--white);
  }
  .tab.active {
    background: var(--off);
    color: var(--blue);
    font-weight: 700;
  }
  .tab.coming-soon {
    opacity: 0.5;
    cursor: default;
    font-style: italic;
  }
  .tab.coming-soon:hover {
    background: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.65);
  }

  /* ── PANELS ── */
  .panel { display: none; padding: 32px 48px 56px; }
  .panel.active { display: block; }

  .coming-soon-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 48px;
    text-align: center;
    gap: 12px;
  }
  .coming-soon-panel .cs-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--blue);
    letter-spacing: 2px;
  }
  .coming-soon-panel .cs-sub {
    font-size: 0.9rem;
    color: var(--muted);
  }
  .cs-badge {
    background: var(--yellow);
    color: var(--blue-dark);
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 2px;
  }

  /* ── SESSION BLOCK (Thursday) ── */
  .session-block { margin-bottom: 36px; }

  .session-header {
    display: flex;
    align-items: stretch;
    margin-bottom: 14px;
  }
  .session-accent {
    width: 6px;
    border-radius: 2px 0 0 2px;
    flex-shrink: 0;
  }
  .session-accent.blue   { background: var(--blue); }
  .session-accent.orange { background: var(--orange); }
  .session-accent.yellow { background: var(--yellow); }

  .session-label-box {
    padding: 10px 20px;
    border-radius: 0 3px 3px 0;
  }
  .session-label-box.blue   { background: var(--blue); }
  .session-label-box.orange { background: var(--orange); }
  .session-label-box.yellow { background: var(--yellow); }

  .session-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.45rem;
    letter-spacing: 2.5px;
  }
  .session-name.blue, .session-name.orange { color: var(--white); }
  .session-name.yellow { color: var(--blue-dark); }

  .session-sub {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-top: 1px;
  }
  .session-sub.blue, .session-sub.orange { color: rgba(255,255,255,0.7); }
  .session-sub.yellow { color: rgba(0,36,122,0.6); }

  /* ── GRID ── */
  .events-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }

  /* ── CARD ── */
  .card {
    background: var(--white);
    border-radius: 4px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .card-top {
    padding: 12px 16px 10px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .card-top.blue   { background: var(--blue); }
  .card-top.orange { background: var(--orange); }
  .card-top.yellow { background: var(--yellow); }
  /* Wednesday uses blue always */
  .card-top.wed    { background: var(--blue); }

  .card-top h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.15rem;
    letter-spacing: 1.5px;
    line-height: 1.1;
  }
  .card-top.blue h3, .card-top.orange h3, .card-top.wed h3 { color: var(--white); }
  .card-top.yellow h3 { color: var(--blue-dark); }

  .cap {
    font-size: 0.67rem;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 2px;
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }
  .card-top.blue .cap, .card-top.wed .cap { background: var(--orange); color: var(--white); }
  .card-top.orange .cap { background: var(--blue); color: var(--white); }
  .card-top.yellow .cap { background: var(--blue); color: var(--white); }

  .card-body { padding: 12px 16px 14px; }

  .teacher-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .teacher-row:last-child { border-bottom: none; }

  .av {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--blue);
    color: var(--white);
    font-size: 0.63rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .av.pre { background: var(--orange); }

  .tname { flex: 1; font-size: 0.83rem; font-weight: 500; color: var(--text); }
  .pre-tag {
    font-size: 0.63rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--orange-dark);
    background: var(--orange-pale);
    border: 1px solid rgba(255,107,0,0.25);
    padding: 2px 6px;
    border-radius: 2px;
  }
  .loc-row {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--muted);
    padding: 6px 16px;
    background: var(--off);
    border-bottom: 1px solid var(--border);
  }

  @media print {
    .tabs, .btn-print { display: none; }
    .panel { display: block !important; page-break-before: always; }
    .panel:first-of-type { page-break-before: avoid; }
    body { background: white; }
    .panel { padding: 16px; }
    .card { break-inside: avoid; }
    header { padding: 20px 24px 0; }
    .header-top { padding-bottom: 16px; }
  }
  @media (max-width: 640px) {
    header { padding: 24px 20px 0; }
    .panel { padding: 20px 16px 40px; }
    .events-grid { grid-template-columns: 1fr; }
    header h1 { font-size: 2.4rem; }
    .tab { padding: 8px 14px; font-size: 0.75rem; }
  }
</style>

/* ── TAB LOGIC ── */
function showTab(id) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.remove('active');
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

  const map = { 'mid-1': 0, 'mid-2': 1, 'mid-3': 2, 'fim': 3 };
  document.querySelectorAll('.tab')[map[id]].classList.add('active');
  document.getElementById('panel-' + id).classList.add('active');
}

function ini(n) { return n.split(' ').slice(0,2).map(x => x[0]).join('').toUpperCase(); }

function buildCard(ev, colorClass) {
  const tHTML = ev.teachers.map(t => `
    <div class="teacher-row">
      <div class="av ${t.pre ? 'pre' : ''}">${ini(t.name)}</div>
      <span class="tname">${t.name}</span>
      ${t.pre ? '<span class="pre-tag">' + (t.role || 'Ábyrgð') + '</span>' : ''}
    </div>
  `).join('');
  const locHTML = ev.loc ? `<div class="loc-row">📍 ${ev.loc}</div>` : '';
  return `
    <div class="card">
      <div class="card-top ${colorClass}">
        <h3>${ev.name}</h3>
        ${ev.cap ? `<span class="cap">${ev.cap} nem.</span>` : ''}
      </div>
      ${locHTML}
      <div class="card-body">${tHTML}</div>
    </div>
  `;
}
